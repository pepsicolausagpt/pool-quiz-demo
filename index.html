<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Квиз для расчета полипропиленового бассейна под участок"
    />
    <title>Расчет бассейна</title>
    <script type="module" crossorigin src="/pool-quiz-demo/assets/index-CRzQ1tFy.js"></script>
    <link rel="stylesheet" crossorigin href="/pool-quiz-demo/assets/index-Xbel3DMW.css">
    <script>
      (function () {
        var fixedUrl = window.location.origin + "/pool-quiz-demo/presentation.pdf";
        var logoUrl = window.location.origin + "/pool-quiz-demo/images/logo-lab-pools.svg?v=20260507-logo-transparent";
        var priceIncrease = 15000;
        var priceIncreaseMarker = String(priceIncrease);

        function replaceOwnText(element, from, to) {
          if (element.textContent.indexOf(to) !== -1) return;
          Array.prototype.forEach.call(element.childNodes, function (node) {
            if (node.nodeType === Node.TEXT_NODE && node.nodeValue.indexOf(from) !== -1) {
              node.nodeValue = node.nodeValue.replace(from, to);
            }
          });
        }

        function raiseVisibleBowlPrices() {
          document.querySelectorAll(".price-line").forEach(function (element) {
            if (element.dataset.priceRaised === priceIncreaseMarker) return;

            var text = element.textContent;
            if (text.indexOf("Чаша") === -1) return;

            var match = text.match(/(\d[\d\s]*)\s*руб\./);
            if (!match) return;

            var current = Number(match[1].replace(/\s/g, ""));
            if (!Number.isFinite(current)) return;

            var updated = current + priceIncrease;
            element.textContent = text.replace(match[0], updated.toLocaleString("ru-RU") + " руб.");
            element.dataset.priceRaised = priceIncreaseMarker;
          });
        }

        function fixLogo() {
          document.querySelectorAll('.brand-mark img[src$="logo-lab-pools.svg"]').forEach(function (logo) {
            logo.src = logoUrl;
          });
        }

        function fixPageLinksAndLabels() {
          document.querySelectorAll('a[href="/presentation.pdf"]').forEach(function (link) {
            link.href = fixedUrl;
          });

          document.querySelectorAll("button, a, span").forEach(function (element) {
            replaceOwnText(element, "Начать расчет", "Начать расчет бассейна");
            replaceOwnText(element, "Открыть презентацию", "Открыть презентацию павильонов");
            replaceOwnText(
              element,
              "Индивидуальный расчет / бассейн более 7 метров",
              "Индивидуальный расчет бассейна из полимерных панелей более 7 метров"
            );
          });

          fixLogo();
          raiseVisibleBowlPrices();
        }

        document.addEventListener("DOMContentLoaded", fixPageLinksAndLabels);
        window.addEventListener("load", fixPageLinksAndLabels);
        new MutationObserver(fixPageLinksAndLabels).observe(document.documentElement, {
          childList: true,
          subtree: true,
          attributes: true,
          attributeFilter: ["href", "src"],
        });
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
