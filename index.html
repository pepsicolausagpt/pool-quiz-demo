<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Квиз для расчета полипропиленового бассейна под участок"
    />
    <title>Расчет бассейна</title>
    <script type="module" crossorigin src="/pool-quiz-demo/assets/index-CRzQ1tFy.js"></script>
    <link rel="stylesheet" crossorigin href="/pool-quiz-demo/assets/index-Xbel3DMW.css">
    <style>
      .brand-mark {
        padding: 14px 18px 13px !important;
        border: 1px solid rgba(255, 255, 255, 0.38) !important;
        border-radius: 14px !important;
        background: rgba(255, 255, 255, 0.36) !important;
        box-shadow: 0 14px 34px rgba(20, 28, 42, 0.09) !important;
        -webkit-backdrop-filter: blur(12px) saturate(1.08) !important;
        backdrop-filter: blur(12px) saturate(1.08) !important;
      }

      .brand-mark img {
        width: clamp(210px, 18vw, 320px) !important;
        height: auto !important;
      }

      @media (max-width: 760px) {
        .brand-mark {
          padding: 10px 13px 9px !important;
        }

        .brand-mark img {
          width: 190px !important;
        }
      }
    </style>
    <script>
      (function () {
        var fixedUrl = window.location.origin + "/pool-quiz-demo/presentation.pdf";
        var logoUrl = window.location.origin + "/pool-quiz-demo/images/logo-lab-pools.svg?v=20260507-logo-roomy-safe2";
        var heroTitle = "Подберем бассейн со всем необходимым из максимально возможного.";
        var priceIncrease = 15000;
        var priceMarker = "bowl-15000";
        var pending = false;

        function replaceOwnText(element, from, to) {
          if (!element || element.textContent.indexOf(to) !== -1) return;
          Array.prototype.forEach.call(element.childNodes, function (node) {
            if (node.nodeType === Node.TEXT_NODE && node.nodeValue.indexOf(from) !== -1) {
              node.nodeValue = node.nodeValue.replace(from, to);
            }
          });
        }

        function patchHeroTitle() {
          var title = document.getElementById("start-title");
          if (title && title.textContent.trim() !== heroTitle) {
            title.textContent = heroTitle;
          }
        }

        function patchLabels() {
          document.querySelectorAll("button, a, span").forEach(function (element) {
            replaceOwnText(element, "Начать расчет", "Начать расчет бассейна");
            replaceOwnText(element, "Открыть презентацию", "Открыть презентацию павильонов");
            replaceOwnText(
              element,
              "Индивидуальный расчет / бассейн более 7 метров",
              "Индивидуальный расчет бассейна из полимерных панелей более 7 метров"
            );
          });
        }

        function patchLinksAndLogo() {
          document.querySelectorAll('a[href="/presentation.pdf"]').forEach(function (link) {
            link.href = fixedUrl;
          });

          document.querySelectorAll('.brand-mark img').forEach(function (logo) {
            if (logo.src.indexOf('logo-lab-pools.svg') !== -1 && logo.src !== logoUrl) {
              logo.src = logoUrl;
            }
          });
        }

        function patchCustomPoolThumbnail() {
          document.querySelectorAll('img[src*="pool-custom.svg"]').forEach(function (image) {
            var freshUrl = window.location.origin + "/pool-quiz-demo/images/pools/pool-custom.svg?v=20260508-custom-pool-sharp4";
            if (image.src !== freshUrl) {
              image.src = freshUrl;
            }
          });
        }

        function patchBowlPrices() {
          document.querySelectorAll(".price-line").forEach(function (element) {
            if (element.dataset.pricePatch === priceMarker) return;

            var text = element.textContent || "";
            if (text.indexOf("Чаша") === -1) return;

            var match = text.match(/(\d[\d\s]*)\s*руб\./);
            if (!match) return;

            var current = Number(match[1].replace(/\s/g, ""));
            if (!Number.isFinite(current)) return;

            var updated = current + priceIncrease;
            element.textContent = text.replace(match[0], updated.toLocaleString("ru-RU") + " руб.");
            element.dataset.pricePatch = priceMarker;
          });
        }

        function patchPage() {
          pending = false;
          patchLinksAndLogo();
          patchHeroTitle();
          patchLabels();
          patchCustomPoolThumbnail();
          patchBowlPrices();
        }

        function schedulePatch() {
          if (pending) return;
          pending = true;
          window.setTimeout(patchPage, 0);
          window.setTimeout(patchPage, 120);
          window.setTimeout(patchPage, 500);
        }

        if (document.readyState === "loading") {
          document.addEventListener("DOMContentLoaded", schedulePatch, { once: true });
        } else {
          schedulePatch();
        }

        window.addEventListener("load", schedulePatch, { once: true });
        document.addEventListener("click", schedulePatch, true);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
